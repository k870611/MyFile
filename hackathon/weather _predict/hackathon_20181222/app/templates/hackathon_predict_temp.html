<!DOCTYPE html>
<html>
<head>

	<meta charset="UTF-8">

	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.4.0.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/nv.d3.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/Intimidatetime.css') }}">

	<script src="{{ url_for('static', filename='js/jquery.min.js') }}"></script>
	<script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
	<script src="{{ url_for('static', filename='js/d3.min.js') }}"></script>
	<script src="{{ url_for('static', filename='js/nv.d3.js') }}"></script>
	<script src="{{ url_for('static', filename='js/basicChart.js') }}"></script>
	<script src="{{ url_for('static', filename='js/Intimidatetime.js') }}"></script>

	<script type=text/javascript>
		$SCRIPT_ROOT = {{ request.script_root|tojson|safe }};

	  	var csrf_token = $('meta[name=csrf-token]').attr('content')

		$.ajaxSetup({
			beforeSend: function(xhr, settings) {
				if (!/^(GET|HEAD|OPTIONS|TRACE)$/i.test(settings.type) && !this.crossDomain) {
					xhr.setRequestHeader("X-CSRFToken", csrf_token)
				}
			}
		})

	</script>

<title>Hackathon - Weather predict</title>
</head>
<body>
<div id="Loading" style="z-index:500; width:100%; height:100%; background:#e5e5e5; position:fixed; top:0px; left:0px; opacity:0.5; display:none">
	<img id="load" src="{{ url_for('static', filename='img/loading.jpg') }}" style='position:absolute; left:40%; top:40%; height:300px; z-index:500;'/>
</div>

<div class="grid-container" style="min-height: 785px;">

	<div class="grid-item header">
		<h1>Hackathon - Weather predict</h1>
	</div> 
	
	<div class="grid-item sidebar">
		<nav class="navbar navbar-expand-md navbar-dark bg-dark sidebarNav">
			<a class="navbar-brand sidebarNavBrand" href="#">Hackathon - Weather predict</a>
			<button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent">
				<span class="navbar-toggler-icon"></span>
			</button>
			
			<div class="collapse navbar-collapse" id="navbarSupportedContent">
				<ul class="nav nav-stacked navVerticale">
					<li class="nav-item">
						<div class="multiselect">
							<div class="selectBox" onclick="showCheckboxes()">
								<select>
									<option>Select year</option>
								</select>
								<div class="overSelect"></div>
							</div>

							<div id="checkboxes" onmouseleave="showCheckboxes()"></div>
						</div>
					</li>

					<li class="dropdown">
					  	<button class="btn btn-secondary dropdown-toggle btnSidebarToggler" data-toggle="dropdown">
					  		Chart
					  	</button>
					  
						<div class="dropdown-menu" style="padding:5px;">
				          	<button id="btnTable" class="btn btn-info btn-block">Table</button>
				          	<div class="dropdown-divider"></div>

				          	<button id="btnBar" class="btn btn-primary btn-block">Bar</button>
				          	<div class="dropdown-divider"></div>
				          	
				          	<button id="btnLine" class="btn btn-success btn-block">Line</button>
				          	<div class="dropdown-divider"></div>
				          	
				          	<button id="btnStack" class="btn btn-danger btn-block">Stack</button>
				          	<div class="dropdown-divider"></div>
				        </div>
					</li>

					<li class="nav-item" style="width:100%;">
						<br/>
						<span style="color: white; font-size: 30px; padding: 10px; font-weight: bold;"> Weather Predict</span>
						<br/>
						<input style="width: 95%;" id="weather_date" class="form-control" placeholder="please choose a date" readonly onblur="input_check(this, 'datetime')"/>
						<span style="color: white; font-size: 25px; padding: 10px; font-weight: bold; margin-bottom:10px; display:none;" id="predict_output"></span>
						<br/>

						<button id="btnPredict" class="btn btn-secondary" style="margin: 10px 5px;">Predict</button>
						<button id="btnReCrawl" class="btn btn-secondary" style="margin: 10px 30px;">ReCrawl</button>

					</li>
				</ul>
				
			</div>
		</nav>

	</div>

	<div class="grid-item main">
		<table id="tb_table" class="table table-bordered">
			<thead>
				<tr>
					<td>Time</td>
					<td>Value</td>
				</tr>
			</thead>
			
			<tbody></tbody>
		
		</table>
		
		<svg id="s"></svg>
		<div id="container"></div>
	</div> 
</div>
<script>
	// Get data-----------------------------------------------------------------------------
		d3.json("/data/temp_data", function(data) {
			$('#checkboxes').html(null);
			for (d in data) {
				$('#checkboxes').append(
					"<div><input class='chk_year' type='checkbox' value='"+data[d]["time"]+"'/>"+data[d]["time"]+"</div>"
				);
				console.log(data);

				total_data_set = data;
			}
		});
</script>

<script type="text/javascript" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
