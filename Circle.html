<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">  
	.circle{    
		width: 25px;      
		height: 25px;    
		font-size:15px;  
		background-color:red;      
		border-radius: 50%;      
		-moz-border-radius: 50%;      
		-webkit-border-radius: 50%;   
		text-align: center;
		color:white;
	}
	
	.childElement {
      position: relative;
      top: 3px;
    }
</style>

</head>
<body>
	<div class="circle"><span class="childElement">21</span></div>
</body>
</html>
